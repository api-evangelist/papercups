meters:
- name: compute_hours
  description: Hours of compute running the Elixir/Phoenix application server and BEAM VM.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - environment
- name: database_storage
  description: PostgreSQL storage for conversations, messages, and customers.
  unit: gigabytes
  aggregation: max
  dimensions:
  - account
  - environment
- name: bandwidth
  description: Egress bandwidth for the chat widget, REST API, and WebSocket traffic.
  unit: gigabytes
  aggregation: sum
  dimensions:
  - account
  - environment
- name: websocket_connections
  description: Concurrent Phoenix Channels WebSocket connections, a driver of memory and compute sizing.
  unit: connections
  aggregation: max
  dimensions:
  - account
  - environment
principles:
- name: Visibility
  description: Tag the cloud resources (compute, DB, storage) that run Papercups so self-hosting cost is attributable.
- name: Allocation
  description: Map infrastructure spend to the support/CX team or cost center that owns the deployment.
- name: Optimization
  description: Right-size compute and database for concurrent WebSocket load; scale BEAM nodes horizontally only as needed.
- name: Accountability
  description: Review monthly cloud spend for the deployment against expected conversation/message volume.
maintainers:
