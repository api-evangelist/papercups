description: >-
  FinOps view of Papercups spend. As open-source (MIT) self-hostable software,
  Papercups has no per-call API charges from the project; the dominant cost is
  the infrastructure required to operate it (compute, database, storage,
  bandwidth) plus engineering time to deploy and maintain it. There is no
  vendor invoice in the self-hosted model, so FinOps focus shifts to internal
  cloud-resource cost allocation rather than provider metering. Any hosted SaaS
  spend is unconfirmed given the project's maintenance-mode status.
notes: >-
  Papercups is in maintenance mode and self-hosted by default; cost meters
  below describe self-hosting infrastructure, not provider-billed usage.
  Verify any hosted-tier billing against papercups.io during reconciliation.
sources:
- https://papercups.io
